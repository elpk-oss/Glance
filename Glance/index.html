<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Glance — Red Social Demo</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:8px">
        <rect x="2" y="2" width="20" height="20" rx="5" fill="#4f46e5" />
        <path d="M6 12h6l-2 4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Glance
    </div>
    <nav class="nav">
      <button id="btn-login" class="btn">Iniciar con Google</button>
      <div id="gsi-button" style="display:inline-block;margin-left:8px"></div>
    </nav>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="profile-card">
        <div class="avatar">👤</div>
        <div class="name">Invitado</div>
        <div class="email">—</div>
      </section>
      <section class="links">
        <a href="#inicio">🏠 Inicio</a>
        <a href="#explorar">🔍 Explorar</a>
        <a href="#mensajes">💬 Mensajes</a>
        <a href="#perfil">👤 Mi Perfil</a>
      </section>
    </aside>

    <section class="feed" id="feed">
      <form id="new-post-form" class="post new-post">
        <textarea id="new-post-text" placeholder="¿Qué estás pensando?" rows="3"></textarea>
        <div style="text-align:right;margin-top:8px">
          <button id="btn-post" class="btn" type="submit">Publicar</button>
        </div>
      </form>
    </section>

    <aside class="rightcol">
      <section class="suggestions">
        <h3>🌟 Sugerencias</h3>
        <p>Inicia sesión para ver a tus amigos y seguir perfiles que te interesen.</p>
      </section>
    </aside>
  </main>

  <footer class="site-footer">© 2024 Glance — Red Social Demo • Diseño responsive</footer>

  <script src="js/app.js"></script>
</body>
</html>
